services:
  suzume-server:
    build:
      context: .
      dockerfile: suzume-server/Dockerfile
    container_name: suzume-server
    restart: unless-stopped
    environment:
      SUZUME_SERVER_HOST: 0.0.0.0
      SUZUME_SERVER_PORT: 18080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      ANKI_CONNECT_URL: ${ANKI_CONNECT_URL:-http://127.0.0.1:8765}
      SUZUME_ALLOWED_ORIGINS: ${SUZUME_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      RUST_LOG: ${RUST_LOG:-info,tower_http=info}
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  suzume-client:
    build:
      context: .
      dockerfile: suzume-client/Dockerfile
    container_name: suzume-client
    restart: unless-stopped
    depends_on:
      suzume-server:
        condition: service_healthy
    ports:
      - "${SUZUME_CLIENT_BIND_IP:-0.0.0.0}:${SUZUME_CLIENT_PORT:-4173}:4173"
